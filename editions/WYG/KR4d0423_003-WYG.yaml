body:
  text: 淮陽集後序勝國淮陽張獻武王初以中州著姓臣事蒙古為之奔走効力逼宋海隅遂滅其國功業雖盛君子弗取獨其詩集之僅存者嘗取讀之據鞍撗槊意氣豪放由軍中雅歌而下少見其比况時方馳逐金戈銕馬間自非有志於投戈講藝息馬論道奚暇及此是則為可取焉者也詩集首題淮陽張獻武王元人盖侈其爵諡云爾乃今僭易之曰張淮陽詩集若唐之韋蘇州以詩鳴宋之秦淮海以樂府鳴之類是已樂府仍附於其後顧舊本觸首随落且傳之者復甚鈔於是拾遺補闕重加校正命工翻刻庶備元詩之一家張諱宏範字仲疇中州河内人履歴之詳具載元史本傳云時正徳辛未嵗孟冬之吉知公安縣事宿人周鉞書
