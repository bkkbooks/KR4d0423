front:
  text: 淮陽集詩餘
  hash: sha256:65e4f185463c88fbb7da93d6bfbb917aea505803f2a059b7873c4a9028679766
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0423_WYG_002-1a, image: WYG1191/WYG1191-0717c.png}
body:
  text: 樂府木蘭花慢題亳州武津關憶譙都風物飛一夢過千年羡百里溪程兩行隄栁數萬人煙傷心舊家遺迹謾斜陽栁水接長天冷落故祠香火白雲淚眼澘然行藏好向故人傳椽筆舞蠻箋總糾糾貔貅秋風江上髙卧南邊功名笑談尊俎問錦江何必上樓船他日武津關下春風驕馬金鞭又征南三首混魚龍人海快一夕起鵾鵬駕萬里長風髙掀北海直入南溟生平許身報國等人間生死一毫輕落日旌旗萬馬秋風鼓角連營炎方灰冷已如氷餘燼淡孤星愛銅柱新功玉關奇節特請髙纓胸中泠然氷雪任蠻煙瘴霧不須驚整頓乾坤事了歸來虎拜龍庭又功名歸墮甑便拂袖不須驚且書劍蹉跎林泉笑傲詩酒飄零人間事良可笑似長空雲影弄隂晴莫泣窮途老淚休憐兒女新亭浩歌一曲飯牛聲天際暮煙冥正百二河山一時冠帶老却升平英雄亦應無用擬風塵萬里奮鵬程誰憶青春富貴為憐四海蒼生又乾坤秋更老聽鼓角壯邊聲縱馬蹙重山舟橫滄海戮虎誅鯨笑入蠻煙瘴霧看旌麾一舉要澄清仰報九重聖德俯憐四海蒼生一尊别後短長亭寒日促行程甚翠袖停杯紅裙住舞有雨君聽鵬翼豈徒髙舉卷天南地北日升平記取歸來時候海棠風裏相迎滿江紅襄陽寄順天友人奔驛南來擁貔貅且趨江右良自愧劣才微渺聖恩洪厚萬里長江今我有百年堅壁非他守看虎牙飛上萬山頭誅羣醜風雨夢鄉關友南北事君知否寄一緘梅信小春時候夜靜戟門嚴鼓角月明蓮幕間詩酒怕故人相憶問歸期平蠻後臨江山千古武陵溪上路桃花流水潺潺可憐仙侣剩濃歡黃鸝驚夢破青鳥喚春還回首舊遊渾不見蒼煙一片荒山玉人何處倚闌干紫簫明月底翠袖暮雲寒又愛煞林泉風物好羡他歸去來兮世緣相挽又還思功名當壯嵗疏懶記當時肝膽自知塵輩異鳯池麟閣須期風雲滿目任時宜東山髙卧處絲竹醉吳姬點綘唇詠海棠醉臉勻紅向人無語誇顔色一枝春雪猶染嵬坡血庭院黃昏燕子來時節芳心折露垂香頰羞對開元月又庭院黃昏子規啼破開元夢晚風吹動似舞霓裳弄有色無香好著詩人諷和誰共月廊煙重燒徹蘭膏鳯又星斗文章詞源落落傾胸臆十年南北幾度空相憶把酒留君後會知何夕愁如織一鞭行色春雪梅花驛又春日前村一枝香徹江頭路月明風度清煞西湖句昨夜幽歡夢裏誰呼去愁如許覺來無語青鳥啼芳樹又獨上髙樓恨隨長草連天去亂山無數隔斷巫陽路信斷梅花惆悵人何處愁無語野鴉煙樹一點斜陽暮南鄉子深院日初長萬卷詩書一炷香竹掩茅齋人不到清涼茶罷西軒讀老莊世事莫論量今古都輸夢一場笑煞利名途上客乾忙千丈紅塵兩鬢霜又送劉仲澤夀天地萃英靈秀出人龍問世生不只文章為第一崢嶸氣吐虹霓萬丈橫白褐黑頭卿埋滅黃塵氣未平昨夜長庚髙似月分明光照乾坤徹五更又贈歌妓淺淡漢宫糚扇底春風玉有香特地向人歌一曲非常縱使無情也斷腸寶髻繡霓裳雲雨巫山窈窕娘好著千金携得去何妨絲竹東山醉玉觴又送友人劉仲澤北歸煙草入重城馬首關山接去程幾度留君留不住傷情一片秋蟬雨後聲無語淚縱橫别酒和愁且強傾後會有期須記取叮嚀莫負中秋夜月明又寄劉仲澤音信怪來稀世態時情固自宜莫比紅塵兒女輩須知義士交情死不移應是占花期簫鼓東城醉玉姬誰念書生寒屋底傷悲忍淚窗前聽子規太常引晚涼庭院鎖黃昏鼓角靜譙門酒興戀詩魂清繞斷梅梢月䀶胸中豪氣壺中春色醉眼小乾坤今古不須論且更盡花前幾尊浣溪沙山掩人家水繞坡野狼巖鳥太平歌黃雞白酒興偏多幸自琴書消日月儘教名利走風波釣臺麟閣竟如何其二一片西山畫不成無人來此結茅亭野猿山鳥樂升平名利著人濃似酒肝腸熟醉不能醒黃塵奔走過浮生其三新卜西山崦下莊疏籬編竹草苫堂門前流水栁成行滿目煙嵐詩酒地十年鞍馬是非場虛名半紙幾多忙青玉案寄劉仲澤西風天際征鴻去問曽過燕山路葉落虛亭空緑樹一川秋意滿懷愁緒樓外蕭蕭雨天涯望斷行雲暮好著蠻箋寄情句底是相思斷腸處吟風賦月論文説劍無個知音侣清平樂四首關河南北有雁無消息落日樓頭人正憶啼烏一聲山碧鶯鶯燕燕爭春紅塵馬足車輪惟有新豐豪客東風老淚霑巾髙眠忩北偃卧喧雷息依約關山歸路憶夢繞池塘春碧功名負我青春匆匆日月奔輪且把琴書歸去山林道髮儒巾天南地北何日兵塵息四海升平歸老憶鳯逺岐山空碧衣冠滚滚爭春誰能卧轍攀輪一劍風雲未遂幾回怒髮衝巾窮冬冷落客思添蕭索濁酒沽來須強酌要把間愁推却時間榮辱何驚胸中氣象休更且匣風雲長劍天容兩鬢青青青春來金裝寶劍藏龍口玉帶紅絨挂虎頭旌旗影裏驟驊騮得志秋喧滿鳯凰樓殿前歡襄陽戰鬼門關朝中宰相五更寒錦衣繡襖兵十萬拔劍搖環定輸嬴此陳間無辭憚捨性命爭功汗將軍戰敵宰相清間鷓鴣天圍襄陽鐵甲珊珊渡漢江南蠻猶自不歸降東西勢列千層厚南北軍屯百萬長弓扣月劍磨霜征鞍遙日下襄陽玉門今日功勞了好去臨江醉一場天淨紗梅梢月黃昏低映梅枝照人兩處相思那的是愁腸斷時彎彎何似渾如弓樣眉兒又西風落葉長安夕陽老雁關山今古别離最難故人何處玉簫明月空間淮陽集詩餘
