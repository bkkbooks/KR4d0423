body:
  text: 淮陽集别集類四元提要臣等謹案淮陽集一卷附録詩餘一卷元張宏範撰宏範字仲疇易州定興人汝南忠武王柔之第九子也官至鎮國上將軍䝉古漢軍都元帥將兵入閩廣滅宋於崖山師還而卒纍贈太師淮陽王諡憲武事蹟具元史本傳其遺詩一百二十篇詞三十餘篇燕山王氏嘗刻之敬義堂故宋禮部侍郎廬陵鄧光薦為之序光薦即宏範南征時被獲不屈因命其子圭事以為師者也後其曽孫監察御史旭重刋明正德中公安知縣周鉞又重刋之此本即從鉞刻傳録蓋猶舊帙宏範嘗從事於郝經頗留心儒術其詩皆五七言近體雖沿南宋末派然大抵爽朗可誦如中酒未醒過似病搜詩不得勝如愁置之江湖集中不辨也亦無愧曹景宗之賦競病矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀淮陽集原序曩者天兵克季宋於崖山時則淮陽獻武王實以元帥統師爰振其武用熸趙燼勳勞之大載在史冊藏之金匱天下後世知其功髙乃若詞章之盛人或不能盡知也王之里人金臺王氏嘗以王之詩歌樂府刻於其家敬義堂雖特其僅存之稿然於是足以知王之詞章為優為耳蓋王以事業之餘適其性情而聊以見之吟詠往往託物感興為多而在於射獵擊毬之事者無幾况夫雅韻清辭雍容諧協固非服介胄者之所能及至其讀韓信李廣傳諸作英氣偉論卓犖發揚又豈拘拘律度之士所能道哉惟王世在名門天資超邁幼嘗學於郝公伯常而友鄧公光薦恆與巨儒學士大夫交故屬意文字為甚王之子恆陽忠獻王歷事纍朝弼成文治為世文臣平生立朝大節若漢之丙魏唐之房杜皆王所素教焉今其曾孫旭為江南諸道行御史臺監察御史訪求先世遺文得敬義堂所刻顧其集猶王之舊諡武烈題其首欲重梓之從宣因僭為之叙以著王之好儒尚文辭章祇其餘事且使天下後世之人知王之世家不獨髙於武功也至正十年庚寅九月吉日中憲大夫江南諸道行御史臺治書侍御史許從宣謹叙故都元帥贈平章諡武烈張公諱宏範字仲疇河內人蔡國武康公第九子也天分英特少從郝經學士雖觀書大略率意吐辭往往踔厲竒偉據鞍縱橫橫槊釃酒叱咤風生豪快天縱其詩類楚漢間烈士語余嘗謂氣文章之主詩筆特功名餘豪曹氏父子氣雄建安劉越石悲憤之作猶度越晉人逺甚斛律金敕勒六朝文士所無唐劉幽求嚴武張建封輩一聨半句音節豪宕自别是固難以常人撿押翰墨徑畦論也中原文獻荒蕪士少有得輒自有餘惟武烈公所作未嘗屬稿篇什隨手散落後親友網羅遺失得其僅有者為詩詞若干將傳於後屬余序惟立功立言自古難並勳業蓋世往往掩其他長矧公文章赫赫照映非出偏長以與文士角逐者然英英在紙略見其人决非營度出吻筆下輒止者所能學亦非凌烟閣上進賢冠大羽箭所能盡存之穹壤要是古今一竒廬陵鄧光薦序
