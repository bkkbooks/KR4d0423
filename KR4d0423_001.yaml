body:
  text: 淮陽集元張宏範撰五言律泛舟繼韻風軟扁舟穩行依緑柳隄孤尊秋露滑短棹晚烟迷夜靜月初上江空天更低飄飄信流去誤過子猷溪雨霽登樓樓外雨初霽乾坤望眼明岸髙秋漲滿簾捲暮霞生燕入泥香潤龍歸海氣清闌干殘照底一片古今情月夜獨酌白酒誰同飲青尊秪自開山風吹雨去海月上天來雅興髙千古狂歌復一杯何當呼李白同醉鳳凰臺柳塘避暑避暑溪塘上悠然世慮踈挂冠疑過鳥濯足礙行魚雨過波紋細風來樹影虛消磨長日事棋罷數行書蓮湖泛舟載酒扁舟穩平湖綺繡鄉半竿殘月暮十里晚風香桂楫分雲錦荷杯吸露漿浩歌明月底驚起宿鴛鴦携妓泛舟遇雨醉漾扁舟去歡生儘棹遲舞回風過處歌罷雨來時鳳斚傳瓊液鸞刀膾玉絲池塘烟樹外一一畫中詩夏日道中六月長安道功名兩字催雲頭烘赤日馬首滲黃埃汗額揮淫雨饑腸轉殷雷輸他河朔客氷酒瀉荷杯逺烟慘淡微風外氤氲老樹頭乍驚香霧薄遙認斷雲浮日落山腰暮雨晴天際秋清明藏不得一片晉家羞宿馬疲盤道峻投宿入招提雨急山溪漲雲迷嶺樹低凉風來殿角赤日下天西偃腹虛簾外林空鳥恣啼枕上客懷苦長夜欹枕冷掀髯半壁荒燈暗窮途老淚淹驚烏疑月樹竊鼠怯風簾百慮秋中集無由到黑甜五言絶句醉中遣興六首把酒莫辭頻呼童更疾溫清明三月節庭院又黃昏把酒莫辭霎休教尊酒空光陰不復得流水只流東酒興唯詩賴詩懷實酒因髙吟到佳處滿酌岸清巾滿酌莫宜側髙歌不論聲醉時狂起舞何必待雞鳴酒盡興不盡心竒詩亦竒更沽一斗酒須到百篇詩飲酒莫妨事吟詩休費心酒從閒裏飲詩向興來吟瓶中桃竹竹同君子操花勝麗人糚洞裏神仙客誰教嫁阮郎花影明月招春魄移痕上小窗暗香浮枕簟乘興滅銀釭寄劉仲澤已負中秋約休愆九日期東籬把菊坐共賦南山詩述懷太古一輪月浮雲幾度漫隂晴從萬態桂影自髙寒七言律詩述懷巳著戎衣十載過江南未了鬢先皤前生應缺路途債今世故教離别多功業千年須好在榮華一笑待如何幾時得遂歸歟志髙詠淵明歲暮歌赴大名路任詔引春風下帝庭恩教遷鎮大名城天寒日短催行色霧重霜濃接去程鵬翼垂天今日志馬頭灑淚故鄉情深承父老殷勤送何日兒童竹馬迎晚凉樓飲携壺信步曳長笻來趁樓頭滿面風龍駕金烏啼海北鯨吹璧月上天東愁空濁酒襟懷豁氣入新詩句法雄此意誰人能㑹得古今好個謫仙翁初夏醉忩睡足碧紗凉簾卷薰風燕子忙滿地落花驚晚吹一溪流水帶斜陽等閒歲月過難再牢落功名拙自傷青鏡秪愁霜鬢改光隂空老郭汾陽新蟬齊宫怨女夢初驚猶對薰風訴别情一自返魂遺舊殼便將秋恨入新聲斷橋髙柳天將暮落日空山雨乍晴鐵石肝腸人聽得也應白髮為君生雛燕羽為香潤態含癡睡足雲兜力尚微喚母但能啾唧語戀巢猶倦往來飛薰風庭院簾初捲落日池臺人乍歸白鳳赤龍渾異事爭如隨分著烏衣和鄭雲表初夏一年好處艷陽天風絮苔紅意慘然寂寂妍春空造化炎炎畏日乍威權香盈脾蜜蜂衙歇泥足梁巢燕寢便旋坼酒香澆鬱氣園林青杏落詩箋射柳年少將軍耀武威人如輕燕馬如飛黃金箭落星三㸃白玉弓開月一圍簫鼓聲中驚霹靂綺羅筵上動光輝回頭笑煞無功子羞對薰風脫錦衣打毬錦繡衣分上下朋畫門雙柱聳亭亭半空綵仗翻殘月一㸃緋毬迸落星翠栁小㕔喧鼓吹玉鞭驕馬蹙雷霆少年得意風流事可勝書生對夜螢假山性癖佳山未得親旋移逺石象天真峰巒草樹安排好巖壑風烟領略新路轉栁遮青隱約雨餘苔漬碧嶙峋儘教做盡千竒怪時下忩前愛主人述懷春風滿鬢緑鬅鬆落落胸懷氣吐虹節操自知堅雪竹行藏未必屬秋蓬歌中牛角兩行淚舞徹雞聲一劍雄肯似少年場上客笙簫日醉軟香中過雙塔千丈黃塵倦客途林梢遙認兩浮圖數家荒店留行李一帶遙山入酒壺勳業壯年勞夢寐等閒老境寄江湖前途黯黯深滄海惆悵西樓日向晡宿龍門落日蒼崕列翠屏翠屏圍宿暮雲橫溪聲清入詩人耳山勢斜盤客子程青草路凉羸馬飽碧林月冷倦烏驚明朝飛過龍門去直挽春風下赤城遇雨未發寒侵詩夢曉初回風雨長松撼半崕絶岫黑雲籠古殿虛檐玉柱碎空階紗忩正熟佳人睡石磴應傷客子懷鞍馬待晴行未得木魚聲裏過晨齊述懷三首飄零孤影寄天涯夢斷春風二鼓撾悶上心來須賴酒愁驅睡去勝如茶龍潛北海收雷迹豹隱南山養霧花天産我材應有意不成空使二毛華梅時又過牡丹期晝掩重門坐似癡為擘愁眉須賴酒欲言雅志豈無詩浮雲暖日隂晴裏殘夢春風富貴時一片肝腸堅玉石肯隨風絮入狂吹思量閒裏百優遊只得尋常兩事憂中酒未醒過似病搜詩不得勝如愁便教酒病慿詩解縱有詩愁著酒酬此外誰無名利念紅塵千丈儘悠悠襄陽答王仲思晝夜干戈備不虞等閒詩酒興全踈承君西屬三詞至愧我東回一字無麾下雄兵山有虎目中窮寇釜奔魚秋風咫尺襄樊了好約扁舟泛五湖初夏好在薰風入舜絃楊花飛去了三眠迎眸新緑初長日回首殘紅又隔年香滿蜜脾蜂翅懶泥乾畫棟燕巢全多情無奈春歸去賴是園林煮酒天梅雨犀浦光風四月新一天細雨弄寒溫絲絲檐外難成滴湛湛江心不見痕煮酒園林妨飲興暮雲樓閣入吟魂儘教燕子銜春去半濕紗忩睡正昏春隂輕雲薄薄鎖峰巒微暗書忩覺嫩寒寂寞梨花渾欲濕顛狂栁絮尚猶乾爭泥燕子情應喜抱蘂遊蜂意欲闌說與密雲休吝雨一犁早足老農歡風栁淡淡池塘近楚宫緑腰裊娜學盤中亂搖荒草飛輕白細搭朱䦨拂落紅枝上嬌鶯啼恰恰樹邉舞蝶意匆匆東君應著吹噓力要把春愁一掃空題保定抱陽山寺山僧掣脫利名韁特去幽巖搆一堂兀坐忘機禪榻靜髙吟縱意竹忩凉奔馳世外心千里參透人間夢一場終日杜門稀萬事此中滋味少人嘗題池州九華山二首萍浦波平兩岸風羣山爭妬九華雄城頭秋日掀髯裏檻外詩成極目中霞日晚時山更翠江鷗潛處蓼偏紅樓間多少前賢句惆悵烟嵐自古同客逢佳節若為酬地主相邀上北樓滿目竒觀風日晚一襟清興不勝秋笑傾琥珀歡無極醉指芙蓉看未休莫怪羣山竟遮映數峰髙處愈風流南征二首百戰歸來氣未鬆紫泥又起作元戎樓船萬艓三山外塞馬千羣百粵中舉目山川渾各異傷心風景不相同明年事了朝天去銅柱東邉第一功離多㑹少古皆然惟我平生苦太偏已是十年驅戰馬又還萬里駕征船相思回首南天角獨許傾心北闕邉寄語古人知道否戮鯨沈海在來年送張孝先乘驛歸來氣未停江頭還又送君行少年鞍馬崢嶸路暮歲笙歌富貴程半紙荒詩千里贐一杯别酒十分情故鄉為向諸公道功業悠悠白髮生讀韓信傳一怒燕齊楚趙收將軍今古果誰儔後來肯為陳豨計先日何辭蒯徹謀自是多年慚噲等何能輕舉學留侯可憐一片肝腸鐵却使終遺萬古羞共賦行田不屑人間事業忙日迷歌舞少年場樓臺夜月延佳客花竹春風擁謝娘笑倩叉金挑燭影醉嫌杯玉擘橙香誰知原上農家子鞭裊殘星曉露凉春雪餘寒料峭黃昏暮驚見東風吹栁絮杜陵野老獨歸來却入灞陵橋上路黃鶯愁立花深處恨濕金衣寒兩羽園林渾似晚春時一片瓊花飛玉樹寄樞密院郭良弼三百年基數戰休君臣束手願歸囚上天有命聖皇福下國無謀賢相籌笑我青蠅隨驥尾看人滄海據鼇頭此行幸見太平了收拾琴書覔舊遊七言絶句槐井翠浮石甃雨苔青影落寒泉墮月明酒醒渴懷無處著緑陰風送轆轤聲即席贈别離筵不必奏笙簧說劍論詩醉一場别後有期期不定水萍風絮雨茫茫遊春閒逐東風信馬啼一鞭詩思曲江隄行行貪詠梨花雪却被桃花約帽低讀李廣傳弧矢威盈塞北屯漢家飛將氣如神伹教千古英名在不得封侯也快人老子送西遊圖𤣥教淵源自廣成五千文字總忘情先生本是無為者何苦青牛萬里行醉中二首玉液流春暢白鷗醉時不覺有離愁軒昂兩袖乾坤窄疑是隂陽之外遊金杯㶑灔漲蒲萄玉頰潮紅意氣豪一撮乾坤是何物古今只解戲兒曹墨竹麝墨雲香小木叢淡烟橫月翠玲瓏小屏春鎖緑忩夢也勝江湖烟雨中射虎黑風髙騎卷空山怒吼巖林出錦斑得意將軍飛鐵鏃忽驚一㸃草梢殷出獵臂鷹攜犬袴腰弓四野長圍馬疾風恨煞棘林狐兔走肯教容易出圍中新燕海棠開後月黃昏王謝樓臺寂寂春栁外東風花外雨香泥髙壘畫堂深燕語入户穿簾語畫梁幾驚春睡惱人腸爭如慿此呢喃舌說與東君莫去忙青杏落盡殘紅緑滿枝青青如豆釀酸時佳人摘得新嘗怯一㸃春愁鎖畫眉栁絮東風殢煞栁梢頭吹去香綿得自由不到池塘成翠靨顛狂飛入酒家樓柳綿暗織千絲了不忙不須蠶繭不須桑請君試看春風外楊柳枝頭噴雪香詩魂渺渺幽懷與月髙花前醉裏興增豪也曾天外搜佳句又逐東風到酒槽聞角戍樓一曲老龍嘶霜滿秋空月影西客裏夢回聽不得殘燈明滅伴人啼寒食後家家鑽火露新烟花褪殘紅柳吐綿底是遊人腸斷處杏桃影裏拆鞦韆自遣獨對西風酒一尊可憐庭院正黃昏何當釣出滄浪月豁我詩魂伴醉魂碧桃花應是𤣥都觀裏仙為嫌白淡厭紅蔫故栽一種新顔色疑是飛仙墜翠鈿燭淚惜别終宵話不休煌煌燈燭照離愁蠟花本是無情物特向人前也淚流未開牡丹包藏國色與天香儘使游蜂自在狂直待百花零落後旋誇魏紫共姚黃紅梨花嫣然帶雨濕胭脂却似去年霜葉時說與謫仙渾不識向人誰詠雪香詩梅雨輕雲薄薄暗江干幾陳紗忩送嫩寒濃醉呼童新摘得未黃梅子已微酸送春東君回馭欲何之把酒江頭話别離流水泛紅留不住儘教沈醉不須思垂絲海棠環兒宴罷沈香下困竒東風緑樹陰可是醉頭扶不起低垂芳臉謾沈吟拆鞦韆畫柱青苔卧寂寥綵繩無計戀春嬌可憐明月梨花院閒煞春風第一宵花落流水無情來洞口狂風何意戀枝頭惜花人在東風外更比鶯兒燕子愁紅葉怪來清曉霜如雪一夜千林染猩血豪氣如虹酒似川直教醉臉紅如葉晚歸笑談尊俎興何窮鯨吸琉璃琥珀濃沈醉㦸門歸去晚月明街靜一聲鐘壓沙懷古二首秦宫漢苑為功名梵寺何由也廢興試問雪香庭上月向人脉脉不能譍桃花慣聽𤣥都觀萬樹梨花是壓沙一夕春風俱掃地雪香庭下盡桑麻春寒去歲清明花簇檐今年寒食尚凝嚴往來忙煞蜂兒翅偷採崕花釀蜜甜晚凉緑陰庭院半昏黃月窟風來桂子香好挈一壺呼李白扁舟歸去醉滄浪榴花猩血誰教染絳囊緑雲堆裏潤生香遊蜂錯認枝頭火忙駕薰風過短牆效吕洞賔步虛詞三首紫微朝罷下天關穩跨青鸞落世間兩袖春風何處去洞庭東畔有三山踏遍塵寰天外天興亡萬劫入幽𤣥儘教雞曉鐘催夜一㸃虛名日月先俯視王侯一介輕愚聾人世可憐生隂陽縱有難拘束惟恨人間落姓名晚蟬三生齊女舊精魂哭斷殘陽雨後村千古閨愁無處著斷腸聲裏又黃昏落霞夕陽紅影襯雲衣一段龍文錦不機詩在滕王高閣下半天孤鶩與齊飛驟雨二首滄海龍飛霹靂驚雲間電影萬蛇明六丁怒挽天河水特為人間洗甲兵風擁黃雲龍駕海雷驅紫電雨翻盆長虹千丈忽截斷一片風波起市門雪谷早行圖二首短衣匹馬五更寒老雪荒山去路難為問此行成底事要携春色下長安馬駝殘夢過前溪雲鎖空山雪四垂勳業本從辛苦得可憐歌酒富家兒問梅東風桃李競春光何苦前村雪裏芳孤潔不教塵眼涴野橋斜月自昏黃憶梅記得年時雪後村月明詩酒共黃昏自從别後無消息一片相思入夢魂春信庾嶺梅花噴雪香灞橋烟栁弄鵝黃故鄉望斷無消息獨倚東風雁數行讀書燈半忩寒雨夜深深燒斷蘭膏一寸金莫笑十年塵壁上也曽明破聖賢心跋張伯寧義士圖刺襄豫讓不日死立武程嬰冠青史燕山義士張伯寧千古英名高二子述懷氣吐長虹志未攄劍華生澀土模糊收藏好在甘無用夜半荒雞待一呼泛舟半岸澄波雨後平一篙軟緑信流行滿船明月雙瓶酒歌入荷花深處橫水鷗萬里長江兩白鷗溶溶泄泄恣沈浮一般都在春風裏反不如他得自由落花莫為春歸怨子規百花開盡是飛時算來只是東君罪不合當時著力吹題採蓮圖小娃採得白蓮還此個工夫有底難多少桑間辛苦婦誰人移向畫圖看投宿荒村投宿馬匆匆暫歇離鞍古院中酒盡一杯春日暮吟鞭輕裊興無窮題曹娥廟一夕為親猶盡孝若為男子事君何江淮多少英雄將厚祿肥家學倒戈霜月早行霜滿溪橋月滿山哦詩驢背怯清寒那知年少青樓客醉擁芙蓉夢木蘭壓沙懷古巳聞春日雪生香更著秋來葉醉霜到此春秋無一物不堪回首弔興亡過江磨劍劍石石痕裂飲馬長江江水竭我軍百萬戰袍紅盡是江南兒女血春月分破黃昏緑栁烟娟娟落影卧鞦韆休誇八月中秋夜桃杏香中更苦憐栁眉二首似斂還舒嫩覺羞隋隄如為古今憂翠尖管取傳春意莫向長亭管别愁睡起紗忩對曉奩暫時初識逺山尖多情笑煞張京兆應恐香螺涴玉纎海棠風卷晴霞空樹頭東皇西去太真愁可憐零落胭脂色緑葉爭如枝上稠白蓮灑淚湘妃不喜粧和烟迷月漲秋塘翠盤影裏呈妍白恨煞詩人玉有香佳人晝寢圖午枕風微霧縠凉日長睡損玉霓裳此生幸免春蠶苦何事無心到繡牀守一卷頭世事翻騰儘萬般一心長擬泰山安酒壺書卷林泉意更要詩人仔細看淮陽集
